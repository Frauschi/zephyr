common:
  min_ram: 40
  min_flash: 180
  depends_on: netif
  tags:
    - net
    - coap
    - server
    - tls
  integration_platforms:
    - native_sim

tests:
  net.coap.server.secure: {}
  net.coap.server.secure.wolfssl:
    tags:
      - wolfssl
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - OVERLAY_CONFIG=overlay-wolfssl.conf
