common:
  depends_on: netif
  min_ram: 192
  tags:
    - http
    - net
    - server
    - socket
tests:
  net.http.server.tls:
    platform_allow:
      - qemu_x86
    integration_platforms:
      - qemu_x86
  net.http.server.tls.toolchain:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim
    integration_toolchains:
      - host
      - llvm
  net.http.server.tls.wolfssl:
    tags: wolfssl
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim/native/64
    extra_args:
      - OVERLAY_CONFIG=overlay-wolfssl.conf
